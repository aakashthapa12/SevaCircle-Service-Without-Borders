services:
  - type: web
    name: sevacircle-server
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false        # Set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false        # Set to your Vercel URL after deploying frontend
